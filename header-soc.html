<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabeçalho — Segurança da Informação</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap');

  :root {
    --bg-deep:  #040d1a;
    --bg-panel: #071628;
    --bg-card:  #0a1e35;
    --grid:     rgba(0,180,255,0.05);
    --blue:     #00b4ff;
    --cyan:     #00ffea;
    --green:    #00e676;
    --amber:    #ffab00;
    --purple:   #9c6eff;
    --border:   rgba(0,180,255,0.2);
    --text:     #d4eaf7;
    --dim:      #5a7f9c;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Exo 2', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: var(--sans);
    color: var(--text);
  }

  /* Grid de fundo */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; top: 50%; left: 30%;
    transform: translate(-50%, -50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,80,180,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── WRAPPER PRINCIPAL ── */
  .root {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex;
    align-items: stretch;
    padding: 12px 16px;
    gap: 14px;
  }

  /* ══════════════════════════════
     COLUNA ESQUERDA — CLIMA
  ══════════════════════════════ */
  .col-weather {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    justify-content: center;
  }

  .weather-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    position: relative;
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .weather-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    border-radius: 10px 10px 0 0;
  }
  .weather-card:hover { box-shadow: 0 0 18px rgba(0,180,255,0.15); }

  .weather-city {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .weather-city .pin { color: var(--blue); font-size: 11px; }

  .weather-main {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .weather-icon-wrap {
    width: 44px; height: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,180,255,0.08);
    border: 1px solid rgba(0,180,255,0.18);
    border-radius: 10px;
    font-size: 24px;
  }

  .weather-temp-block { flex: 1; }
  .weather-temp {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
    letter-spacing: -1px;
  }
  .weather-temp sup {
    font-size: 13px;
    font-weight: 400;
    vertical-align: super;
    color: var(--dim);
    letter-spacing: 0;
  }
  .weather-desc {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
    font-weight: 500;
  }

  .weather-meta {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .weather-badge {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--dim);
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 2px 6px;
  }
  .weather-badge .ico { font-size: 10px; }

  .weather-loading {
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    padding: 12px 0;
    letter-spacing: 1px;
  }
  .weather-loading .spin {
    display: inline-block;
    animation: spin-anim 1s linear infinite;
    margin-right: 6px;
  }
  @keyframes spin-anim { to { transform: rotate(360deg); } }

  /* ══════════════════════════════
     DIVISOR VERTICAL
  ══════════════════════════════ */
  .divider-v {
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(0,180,255,0.3) 30%, rgba(0,180,255,0.3) 70%, transparent);
    flex-shrink: 0;
    align-self: stretch;
  }

  /* ══════════════════════════════
     COLUNA DIREITA — EQUIPE
  ══════════════════════════════ */
  .col-team {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
  }

  .team-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .team-title {
    font-size: clamp(14px, 1.6vw, 20px);
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--cyan), var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .team-subtitle {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--dim);
    letter-spacing: 1.5px;
    margin-top: 2px;
  }
  .team-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    display: flex; align-items: center; gap: 5px;
  }
  .team-count .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 5px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Grid de membros */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 7px;
  }

  .member-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all .2s ease;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .member-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px;
    background: linear-gradient(180deg, var(--blue), var(--purple));
    transform: scaleY(0);
    transition: transform .2s;
    border-radius: 0 2px 2px 0;
  }
  .member-card:hover {
    background: rgba(0,100,180,0.12);
    border-color: rgba(0,180,255,0.35);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,180,255,0.1);
  }
  .member-card:hover::before { transform: scaleY(1); }

  .member-avatar {
    width: 38px; height: 38px; flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(0,180,255,0.3);
    background: rgba(0,180,255,0.1);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 10px rgba(0,180,255,0.15);
    transition: border-color .2s, box-shadow .2s;
  }
  .member-card:hover .member-avatar {
    border-color: rgba(0,180,255,0.6);
    box-shadow: 0 0 16px rgba(0,180,255,0.3);
  }
  .member-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.2;
  }
  .member-role {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--dim);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: .4px;
  }

  .member-badge {
    flex-shrink: 0;
    width: 20px; height: 20px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    background: rgba(0,180,255,0.08);
    border: 1px solid rgba(0,180,255,0.2);
    opacity: 0;
    transition: opacity .2s;
  }
  .member-card:hover .member-badge { opacity: 1; }
</style>
</head>
<body>
<div class="root">

  <!-- ════════════════════════
       CLIMA
  ════════════════════════ -->
  <div class="col-weather" id="weatherCol">
    <!-- Cards injetados via JS -->
    <div class="weather-card">
      <div class="weather-loading"><span class="spin">⟳</span> Carregando clima...</div>
    </div>
  </div>

  <div class="divider-v"></div>

  <!-- ════════════════════════
       EQUIPE
  ════════════════════════ -->
  <div class="col-team">
    <div class="team-header">
      <div>
        <div class="team-title">Equipe de S.I</div>
        <div class="team-subtitle">// SEGURANÇA DA INFORMAÇÃO — MEMBROS ATIVOS //</div>
      </div>
      <div class="team-count">
        <div class="dot"></div>
        <span id="memberCount">5 membros</span>
      </div>
    </div>

    <div class="team-grid" id="teamGrid">
      <!-- Membros injetados via JS -->
    </div>
  </div>

</div>

<script>
  /* ══════════════════════════════
     DADOS DA EQUIPE
     Edite aqui para adicionar/remover membros.
     photo: URL da foto OU null para usar o ícone padrão
  ══════════════════════════════ */
  const TEAM = [
    {
      name: 'Rodrigo de Paula Aquino',
      role: 'Auditorias e Controles Internos',
      photo: null,
      icon: '👤'
    },
    {
      name: 'Paulo Henrique Franco M.',
      role: 'Segurança da Informação',
      photo: null,
      icon: '👤'
    },
    {
      name: 'Vinicius Santos da Silva',
      role: 'Segurança da Informação',
      photo: null,
      icon: '👤'
    },
    {
      name: 'Daniel de Souza Leite',
      role: 'Segurança da Informação',
      photo: null,
      icon: '👤'
    },
    {
      name: 'Eder Eloy Franca',
      role: 'Segurança da Informação',
      photo: null,
      icon: '👤'
    }
  ];

  /* ══════════════════════════════
     CIDADES DO CLIMA
  ══════════════════════════════ */
  const CITIES = [
    { name: 'Campo Grande', country: 'BR', lat: -20.469, lon: -54.620 },
    { name: 'São Paulo',    country: 'BR', lat: -23.548, lon: -46.636 }
  ];

  /* ══ Mapeia código WMO → emoji + descrição ══ */
  function weatherInfo(code) {
    const map = {
      0:  { icon:'☀️',  desc:'Céu limpo' },
      1:  { icon:'🌤️', desc:'Principalmente limpo' },
      2:  { icon:'⛅',  desc:'Parcialmente nublado' },
      3:  { icon:'☁️',  desc:'Nublado' },
      45: { icon:'🌫️', desc:'Neblina' },
      48: { icon:'🌫️', desc:'Neblina com geada' },
      51: { icon:'🌦️', desc:'Garoa leve' },
      53: { icon:'🌦️', desc:'Garoa moderada' },
      55: { icon:'🌧️', desc:'Garoa intensa' },
      61: { icon:'🌧️', desc:'Chuva leve' },
      63: { icon:'🌧️', desc:'Chuva moderada' },
      65: { icon:'🌧️', desc:'Chuva forte' },
      71: { icon:'❄️',  desc:'Neve leve' },
      73: { icon:'❄️',  desc:'Neve moderada' },
      75: { icon:'❄️',  desc:'Neve forte' },
      80: { icon:'🌦️', desc:'Pancadas leves' },
      81: { icon:'🌧️', desc:'Pancadas moderadas' },
      82: { icon:'⛈️',  desc:'Pancadas fortes' },
      95: { icon:'⛈️',  desc:'Tempestade' },
      96: { icon:'⛈️',  desc:'Tempestade c/ granizo' },
      99: { icon:'⛈️',  desc:'Tempestade forte' },
    };
    return map[code] || { icon:'🌡️', desc:'—' };
  }

  /* ══ Busca clima via Open-Meteo (sem chave de API) ══ */
  async function fetchWeather(city) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}` +
      `&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m` +
      `&daily=temperature_2m_max,temperature_2m_min&timezone=America%2FSao_Paulo&forecast_days=1`;
    const r = await fetch(url);
    const d = await r.json();
    const cur = d.current;
    const day = d.daily;
    return {
      temp:      Math.round(cur.temperature_2m),
      feels:     Math.round(cur.apparent_temperature),
      code:      cur.weathercode,
      wind:      Math.round(cur.windspeed_10m),
      humidity:  Math.round(cur.relativehumidity_2m),
      maxTemp:   Math.round(day.temperature_2m_max[0]),
      minTemp:   Math.round(day.temperature_2m_min[0]),
    };
  }

  /* ══ Renderiza os cards de clima ══ */
  async function renderWeather() {
    const col = document.getElementById('weatherCol');
    col.innerHTML = '';

    const today = new Date().toLocaleDateString('pt-BR', {
      day:'2-digit', month:'2-digit', year:'numeric'
    });

    for (const city of CITIES) {
      const card = document.createElement('div');
      card.className = 'weather-card';

      try {
        const w = await fetchWeather(city);
        const wi = weatherInfo(w.code);
        card.innerHTML = `
          <div class="weather-city">
            <span class="pin">📍</span>
            ${city.name}, Brasil
          </div>
          <div class="weather-main">
            <div class="weather-icon-wrap">${wi.icon}</div>
            <div class="weather-temp-block">
              <div class="weather-temp">${w.temp}<sup>°C</sup></div>
              <div class="weather-desc">${wi.desc}</div>
            </div>
          </div>
          <div class="weather-meta">
            <div class="weather-badge"><span class="ico">🌡️</span>${w.maxTemp}°/${w.minTemp}°</div>
            <div class="weather-badge"><span class="ico">💧</span>${w.humidity}%</div>
            <div class="weather-badge"><span class="ico">💨</span>${w.wind} km/h</div>
            <div class="weather-badge"><span class="ico">📅</span>${today}</div>
          </div>
        `;
      } catch(e) {
        card.innerHTML = `
          <div class="weather-city"><span class="pin">📍</span>${city.name}, Brasil</div>
          <div class="weather-loading">Sem conexão com o serviço de clima</div>
        `;
      }
      col.appendChild(card);
    }
  }

  /* ══ Renderiza os membros da equipe ══ */
  function renderTeam() {
    const grid = document.getElementById('teamGrid');
    document.getElementById('memberCount').textContent = `${TEAM.length} membros`;

    TEAM.forEach(m => {
      const card = document.createElement('div');
      card.className = 'member-card';

      const avatarContent = m.photo
        ? `<img src="${m.photo}" alt="${m.name}" onerror="this.parentElement.innerHTML='${m.icon}'">`
        : m.icon;

      card.innerHTML = `
        <div class="member-avatar">${avatarContent}</div>
        <div class="member-info">
          <div class="member-name">${m.name}</div>
          <div class="member-role">${m.role}</div>
        </div>
        <div class="member-badge">🔐</div>
      `;
      grid.appendChild(card);
    });
  }

  /* ══ INIT ══ */
  renderTeam();
  renderWeather();

  /* Atualiza clima a cada 10 minutos */
  setInterval(renderWeather, 10 * 60 * 1000);
</script>
</body>
</html>
