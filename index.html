<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Sistemas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            text-align: center;
            padding: 50px;
        }

        h1 {
            margin-bottom: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 250px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #334155;
        }

        a {
            text-decoration: none;
            color: #38bdf8;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Painel de Acesso</h1>

    <div class="container">
        <div class="card">
            <a href="cybersec-architecture.html">
                Arquitetura CyberSec
            </a>
        </div>

        <div class="card">
            <a href="menu-rapido.html">
                Menu Rápido
            </a>
        </div>
    </div>

</body>
</html>
